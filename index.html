<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Bon Anniversaire</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@400;500;600;700&display=swap" rel="stylesheet">
    
    <style>
        * {
            box-sizing: border-box;
            margin: 0;
            padding: 0;
            user-select: none;
            -webkit-user-select: none;
        }

        /* Fond dégradé doux sur le thème de l'amour */
        body {
            font-family: 'Plus Jakarta Sans', sans-serif;
            background: linear-gradient(135deg, #ffe5ec 0%, #ffc2d1 50%, #f9bec7 100%);
            height: 100vh;
            overflow: hidden;
            display: flex;
            justify-content: center;
            align-items: center;
            position: relative;
        }

        /* Lecteur vidéo YouTube caché */
        #youtube-audio {
            position: absolute;
            width: 1px;
            height: 1px;
            opacity: 0;
            pointer-events: none;
        }

        .page {
            display: none;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            text-align: center;
            width: 100%;
            height: 100%;
            z-index: 2;
            position: absolute;
            padding: 20px;
        }

        .page.active {
            display: flex;
        }

        /* Texte en couleur sombre pour bien ressortir sur le fond clair */
        h1 {
            font-size: 2.6rem;
            color: #4a1525;
            margin-bottom: 40px;
            font-weight: 600;
            max-width: 600px;
            line-height: 1.4;
            letter-spacing: -0.5px;
        }

        .big-love {
            font-size: 3.8rem;
            color: #ff4b72;
            font-weight: 700;
            margin-bottom: 25px;
            letter-spacing: -1px;
            animation: pop 0.6s cubic-bezier(0.175, 0.885, 0.32, 1.275) both;
        }

        .love-letter {
            font-size: 1.3rem;
            color: #5c2233;
            max-width: 520px;
            line-height: 1.6;
            font-weight: 500;
            animation: pop 0.8s cubic-bezier(0.175, 0.885, 0.32, 1.275) both;
        }

        .btn {
            font-family: 'Plus Jakarta Sans', sans-serif;
            background-color: #ffffff;
            border: 2px solid #ff4b72;
            padding: 14px 35px;
            font-size: 1.2rem;
            border-radius: 30px;
            cursor: pointer;
            color: #ff4b72;
            transition: all 0.2s ease;
            font-weight: 600;
            box-shadow: 0 4px 15px rgba(255, 75, 114, 0.15);
        }

        .btn:hover {
            background-color: #ff4b72;
            color: #fff;
            transform: scale(1.05);
        }

        .btn-group {
            display: flex;
            gap: 20px;
            margin-top: 20px;
            justify-content: center;
            align-items: center;
            width: 100%;
            max-width: 400px;
        }

        #btn-no {
            position: relative;
            transition: all 0.1s ease;
        }

        /* --- BULLES À ÉCLATER --- */
        .bubble {
            position: absolute;
            background: rgba(255, 255, 255, 0.4);
            border: 2px solid rgba(255, 75, 114, 0.5);
            border-radius: 50%;
            cursor: pointer;
            display: flex;
            justify-content: center;
            align-items: center;
            animation: floatUpGame 4s linear infinite;
            z-index: 5;
            box-shadow: inset 0 0 10px rgba(255, 255, 255, 0.6);
        }

        @keyframes floatUpGame {
            0% { transform: translateY(105vh) scale(1); opacity: 0.9; }
            100% { transform: translateY(-15vh) scale(1); opacity: 0; }
        }

        /* --- CŒURS EN ARRIÈRE-PLAN --- */
        .bg-heart {
            position: absolute;
            color: rgba(255, 75, 114, 0.25);
            pointer-events: none;
            z-index: 1;
            animation: floatBg infinite linear;
        }

        @keyframes floatBg {
            0% { transform: translateY(105vh) rotate(0deg); opacity: 0; }
            10% { opacity: 1; }
            90% { opacity: 1; }
            100% { transform: translateY(-15vh) rotate(360deg); opacity: 0; }
        }

        /* Particules d'éclatement */
        .burst-particle {
            position: absolute;
            color: #ff4b72;
            pointer-events: none;
            font-size: 20px;
            animation: scatter 0.6s ease-out forwards;
            z-index: 10;
        }

        @keyframes scatter {
            0% { transform: translate(0, 0) scale(1); opacity: 1; }
            100% { transform: translate(var(--x), var(--y)) scale(0); opacity: 0; }
        }

        @keyframes pop {
            0% { transform: scale(0.8); opacity: 0; }
            100% { transform: scale(1); opacity: 1; }
        }
    </style>
</head>
<body>

    <!-- Conteneur pour l'API YouTube Player -->
    <div id="youtube-audio"></div>

    <!-- PAGE 1: Accueil -->
    <div id="page1" class="page active">
        <h1>Bon anniversaire ma elise ❤️</h1>
        <button class="btn" onclick="startExperience()">Suivant</button>
    </div>

    <!-- PAGE 2: La question -->
    <div id="page2" class="page">
        <h1>Tu es prête pour la suite ?</h1>
        <div class="btn-group">
            <button class="btn" id="btn-yes" onclick="nextPage(3); startBubbleGame();">Oui</button>
            <button class="btn" id="btn-no" onmouseover="fuiteBouton()" onclick="fuiteBouton()" ontouchstart="fuiteBouton(event)">Non merci</button>
        </div>
    </div>

    <!-- PAGE 3: TRUC INTERACTIF (LES BULLES) -->
    <div id="page3" class="page">
        <h1 id="bubble-title">Éclate 5 bulles roses !</h1>
    </div>

    <!-- PAGE 4: Le message d'amour final direct -->
    <div id="page4" class="page">
        <div class="big-love">Je t'aime ❤️</div>
        <div class="love-letter">
            Merci d'être là à mes côtés chaque jour. J'ai un peu peur d'avoir du mal à trouver ton cadeau et je ne sais pas s'il va te plaire... mais j'espère de tout cœur qu'il te fera plaisir.
        </div>
    </div>

    <script>
        // --- CŒURS EN ARRIÈRE-PLAN ---
        function createBackgroundHearts() {
            const heartsContainer = document.body;
            setInterval(() => {
                const heart = document.createElement('div');
                heart.classList.add('bg-heart');
                heart.innerHTML = Math.random() > 0.5 ? '❤️' : '💖';
                
                // Position et taille aléatoires
                heart.style.left = Math.random() * 100 + 'vw';
                const size = Math.random() * 20 + 15;
                heart.style.fontSize = size + 'px';
                
                // Vitesse aléatoire
                heart.style.animationDuration = (Math.random() * 4 + 6) + 's';
                
                heartsContainer.appendChild(heart);
                setTimeout(() => heart.remove(), 10000);
            }, 450);
        }
        createBackgroundHearts();

        // --- LOGIQUE INTÉGRATION MUSIQUE ---
        let player;
        
        const tag = document.createElement('script');
        tag.src = "https://www.youtube.com/iframe_api";
        const firstScriptTag = document.getElementsByTagName('script')[0];
        firstScriptTag.parentNode.insertBefore(tag, firstScriptTag);

        function onYouTubeIframeAPIReady() {
            player = new YT.Player('youtube-audio', {
                height: '1',
                width: '1',
                videoId: 'oPhfAThtnQw',
                playerVars: {
                    'autoplay': 0,
                    'loop': 1,
                    'playlist': 'oPhfAThtnQw',
                    'controls': 0,
                    'showinfo': 0,
                    'modestbranding': 1
                }
            });
        }

        function startExperience() {
            if (player && typeof player.playVideo === 'function') {
                player.playVideo();
            }
            nextPage(2);
        }

        // --- LOGIQUE DU BOUTON QUI S'ENFUIT ---
        function fuiteBouton(event) {
            if (event) event.preventDefault();
            const btnNo = document.getElementById('btn-no');
            btnNo.style.position = 'fixed';
            
            const maxX = window.innerWidth - btnNo.offsetWidth - 40;
            const maxY = window.innerHeight - btnNo.offsetHeight - 40;
            
            const randomX = Math.floor(Math.random() * maxX) + 20;
            const randomY = Math.floor(Math.random() * maxY) + 20;
            
            btnNo.style.left = randomX + 'px';
            btnNo.style.top = randomY + 'px';
        }

        // --- NAVIGATION ---
        function nextPage(pageNumber) {
            document.querySelectorAll('.page').forEach(page => {
                page.classList.remove('active');
            });
            document.getElementById('page' + pageNumber).classList.add('active');
        }

        // --- JEU DES BULLES ---
        let bubblesPopped = 0;
        let bubbleInterval;

        function startBubbleGame() {
            bubbleInterval = setInterval(() => {
                if (bubblesPopped >= 5) {
                    clearInterval(bubbleInterval);
                    return;
                }
                createBubble();
            }, 600);
        }

        function createBubble() {
            const page3 = document.getElementById('page3');
            const bubble = document.createElement('div');
            bubble.classList.add('bubble');
            
            const size = Math.random() * 40 + 60;
            bubble.style.width = size + 'px';
            bubble.style.height = size + 'px';
            bubble.style.left = Math.random() * (window.innerWidth - size) + 'px';
            bubble.style.animationDuration = (Math.random() * 2 + 3) + 's';

            bubble.onclick = (e) => {
                bubblesPopped++;
                document.getElementById('bubble-title').innerText = "Encore " + (5 - bubblesPopped) + " !";
                
                triggerBurst(e.clientX, e.clientY);
                bubble.remove();

                if (bubblesPopped >= 5) {
                    setTimeout(() => {
                        nextPage(4);
                    }, 400);
                }
            };

            page3.appendChild(bubble);
            setTimeout(() => { bubble.remove(); }, 5000);
        }

        function triggerBurst(x, y) {
            for (let i = 0; i < 8; i++) {
                const p = document.createElement('div');
                p.classList.add('burst-particle');
                p.innerHTML = '❤️';
                p.style.left = x + 'px';
                p.style.top = y + 'px';
                
                const angle = Math.random() * Math.PI * 2;
                const speed = Math.random() * 100 + 40;
                p.style.setProperty('--x', Math.cos(angle) * speed + 'px');
                p.style.setProperty('--y', Math.sin(angle) * speed + 'px');
                
                document.body.appendChild(p);
                setTimeout(() => p.remove(), 600);
            }
        }
    </script>
</body>
</html>
