<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Joyeux Anniversaire</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Fredoka:wght@300..700&display=swap" rel="stylesheet">
    
    <style>
        * {
            box-sizing: border-box;
            margin: 0;
            padding: 0;
            user-select: none;
            -webkit-user-select: none;
        }

        body {
            font-family: 'Fredoka', sans-serif;
            background-color: #0b0205;
            height: 100vh;
            overflow: hidden;
            display: flex;
            justify-content: center;
            align-items: center;
            position: relative;
        }

        #matrix-canvas {
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            z-index: 1;
        }

        .page {
            display: none;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            text-align: center;
            width: 100%;
            height: 100%;
            z-index: 2;
            position: absolute;
            padding: 20px;
        }

        .page.active {
            display: flex;
        }

        h1 {
            font-size: 2.5rem;
            color: #ffffff;
            margin-bottom: 40px;
            font-weight: 500;
            max-width: 600px;
            line-height: 1.4;
        }

        .btn {
            font-family: 'Fredoka', sans-serif;
            background-color: rgba(255, 255, 255, 0.95);
            border: 2px solid #ff4b72;
            padding: 14px 35px;
            font-size: 1.3rem;
            border-radius: 30px;
            cursor: pointer;
            color: #222;
            transition: all 0.2s ease;
            font-weight: 600;
        }

        .btn:hover {
            background-color: #ff4b72;
            color: #fff;
            transform: scale(1.05);
        }

        .btn-group {
            display: flex;
            gap: 25px;
            margin-top: 20px;
            justify-content: center;
            align-items: center;
            min-height: 70px;
            width: 100%;
        }

        #btn-no {
            position: relative;
            transition: all 0.12s cubic-bezier(0.175, 0.885, 0.32, 1.275);
        }

        /* --- STYLE ZONE INTERACTIVE : CŒUR VOLANT --- */
        .interactive-heart {
            font-size: 6rem;
            cursor: pointer;
            animation: float 2s ease-in-out infinite;
            transition: transform 0.1s ease;
            display: inline-block;
            margin-top: 20px;
        }

        @keyframes float {
            0% { transform: translateY(0px) scale(1); }
            50% { transform: translateY(-15px) scale(1.05); }
            100% { transform: translateY(0px) scale(1); }
        }

        /* --- STYLE PAGE FINALE --- */
        .cake-icon {
            font-size: 7rem;
            cursor: pointer;
            transition: transform 0.3s cubic-bezier(0.175, 0.885, 0.32, 1.275);
            margin-bottom: 20px;
        }
        .cake-icon:hover {
            transform: scale(1.15) rotate(5deg);
        }

        .final-message {
            font-size: 1.8rem;
            color: #fff;
            font-weight: 600;
            margin-top: 25px;
            max-width: 500px;
            animation: pop 0.6s cubic-bezier(0.175, 0.885, 0.32, 1.275) both;
        }

        /* Particules d'éclats de cœur */
        .heart-particle {
            position: absolute;
            color: #ff4b72;
            pointer-events: none;
            font-size: 24px;
            animation: burst 0.8s ease-out forwards;
            z-index: 10;
        }

        @keyframes burst {
            0% { transform: translate(0, 0) scale(1); opacity: 1; }
            100% { transform: translate(var(--x), var(--y)) scale(0); opacity: 0; }
        }

        @keyframes pop {
            0% { transform: scale(0.3); opacity: 0; }
            100% { transform: scale(1); opacity: 1; }
        }
    </style>
</head>
<body>

    <canvas id="matrix-canvas"></canvas>

    <!-- PAGE 1: Accueil -->
    <div id="page1" class="page active">
        <h1>Bon anniversaire ma elise</h1>
        <button class="btn" onclick="nextPage(2)">Suivant</button>
    </div>

    <!-- PAGE 2: La question de transition -->
    <div id="page2" class="page">
        <h1>Prête à découvrir ta surprise ?</h1>
        <div class="btn-group">
            <button class="btn" id="btn-yes" onclick="nextPage(3)">Oui</button>
            <button class="btn" id="btn-no" onmouseover="fuiteBouton()" onclick="fuiteBouton()" ontouchstart="fuiteBouton(event)">Non merci</button>
        </div>
    </div>

    <!-- PAGE 3: TRUC INTERACTIF (ATTREPE LE CŒUR) -->
    <div id="page3" class="page">
        <h1>Touche le cœur pour l'ouvrir</h1>
        <div class="interactive-heart" id="clickable-heart" onclick="popHeart(event)">❤️</div>
    </div>

    <!-- PAGE 4: Le Gâteau final -->
    <div id="page4" class="page">
        <h1>Clique sur le gâteau</h1>
        <div class="cake-icon" onclick="openGift()">🎂</div>
        <div id="gift-message" class="final-message" style="display: none;">
            Voici ton cadeau. Passe une excellente journée.
        </div>
    </div>

    <script>
        // --- LOGIQUE DU BOUTON QUI S'ENFUIT ---
        function fuiteBouton(event) {
            if (event) event.preventDefault();
            const btnNo = document.getElementById('btn-no');
            btnNo.style.position = 'fixed';
            
            const maxX = window.innerWidth - btnNo.offsetWidth - 40;
            const maxY = window.innerHeight - btnNo.offsetHeight - 40;
            
            const randomX = Math.floor(Math.random() * maxX) + 20;
            const randomY = Math.floor(Math.random() * maxY) + 20;
            
            btnNo.style.left = randomX + 'px';
            btnNo.style.top = randomY + 'px';
        }

        // --- NAVIGATION ---
        function nextPage(pageNumber) {
            document.querySelectorAll('.page').forEach(page => {
                page.classList.remove('active');
            });
            document.getElementById('page' + pageNumber).classList.add('active');
        }

        // --- ANIMATION CLIC SUR LE CŒUR ---
        function popHeart(event) {
            const heartElement = document.getElementById('clickable-heart');
            
            // On crée plein de petits cœurs qui explosent autour du clic
            for (let i = 0; i < 12; i++) {
                const particle = document.createElement('div');
                particle.classList.add('heart-particle');
                particle.innerHTML = '❤️';
                particle.style.left = event.clientX + 'px';
                particle.style.top = event.clientY + 'px';
                
                // Directions aléatoires à 360 degrés
                const angle = Math.random() * Math.PI * 2;
                const distance = Math.random() * 150 + 50;
                const destX = Math.cos(angle) * distance + 'px';
                const destY = Math.sin(angle) * distance + 'px';
                
                particle.style.setProperty('--x', destX);
                particle.style.setProperty('--y', destY);
                
                document.body.appendChild(particle);
                setTimeout(() => particle.remove(), 800);
            }

            // On passe tout de suite à la page suivante (le gâteau)
            setTimeout(() => {
                nextPage(4);
            }, 200);
        }

        function openGift() {
            document.getElementById('gift-message').style.display = 'block';
        }

        // --- ARRIÈRE-PLAN MATRIX EN ROSE ---
        const canvas = document.getElementById('matrix-canvas');
        const ctx = canvas.getContext('2d');

        function resizeCanvas() {
            canvas.width = window.innerWidth;
            canvas.height = window.innerHeight;
        }
        window.addEventListener('resize', resizeCanvas);
        resizeCanvas();

        const alphabet = "♥LOVE♥ELISE♥TOI♥ALWAYS♥LOVE♥".split("");
        const fontSize = 16;
        let columns = canvas.width / fontSize;
        let rainDrops = [];

        function initRain() {
            columns = canvas.width / fontSize;
            rainDrops = [];
            for (let x = 0; x < columns; x++) {
                rainDrops[x] = Math.random() * -100;
            }
        }
        initRain();

        function drawMatrix() {
            ctx.fillStyle = 'rgba(11, 2, 5, 0.12)';
            ctx.fillRect(0, 0, canvas.width, canvas.height);

            ctx.font = fontSize + 'px sans-serif';

            for (let i = 0; i < rainDrops.length; i++) {
                const text = alphabet[Math.floor(Math.random() * alphabet.length)];
                
                if (Math.random() > 0.98) {
                    ctx.fillStyle = '#ffffff';
                } else {
                    ctx.fillStyle = Math.random() > 0.5 ? '#ff4b72' : '#ff85a2';
                }

                ctx.fillText(text, i * fontSize, rainDrops[i] * fontSize);

                if (rainDrops[i] * fontSize > canvas.height && Math.random() > 0.975) {
                    rainDrops[i] = 0;
                }
                rainDrops[i]++;
            }
        }

        setInterval(drawMatrix, 40);
    </script>
</body>
</html>
