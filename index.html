<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Joyeux Anniversaire</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Fredoka:wght@300..700&display=swap" rel="stylesheet">
    
    <style>
        * {
            box-sizing: border-box;
            margin: 0;
            padding: 0;
            user-select: none;
            -webkit-user-select: none;
        }

        body {
            font-family: 'Fredoka', sans-serif;
            background-color: #0b0205;
            height: 100vh;
            overflow: hidden;
            display: flex;
            justify-content: center;
            align-items: center;
            position: relative;
        }

        #matrix-canvas {
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            z-index: 1;
        }

        .page {
            display: none;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            text-align: center;
            width: 100%;
            height: 100%;
            z-index: 2;
            position: absolute;
            padding: 20px;
        }

        .page.active {
            display: flex;
        }

        /* Texte blanc pur, sans aucun effet néon */
        h1 {
            font-size: 2.5rem;
            color: #ffffff;
            margin-bottom: 40px;
            font-weight: 500;
            max-width: 600px;
            line-height: 1.4;
        }

        .btn {
            font-family: 'Fredoka', sans-serif;
            background-color: rgba(255, 255, 255, 0.95);
            border: 2px solid #ff4b72;
            padding: 14px 35px;
            font-size: 1.3rem;
            border-radius: 30px;
            cursor: pointer;
            color: #222;
            transition: all 0.2s ease;
            font-weight: 600;
        }

        .btn:hover {
            background-color: #ff4b72;
            color: #fff;
            transform: scale(1.05);
        }

        .btn-group {
            display: flex;
            gap: 25px;
            margin-top: 20px;
            justify-content: center;
            align-items: center;
            min-height: 70px;
            width: 100%;
        }

        #btn-no {
            position: relative;
            transition: all 0.12s cubic-bezier(0.175, 0.885, 0.32, 1.275);
        }

        /* --- ZONE DE JEU : TICKET À GRATTER --- */
        .scratch-container {
            position: relative;
            width: 320px;
            height: 180px;
            margin-top: 20px;
            box-shadow: 0 10px 30px rgba(0,0,0,0.5);
            border-radius: 15px;
            overflow: hidden;
            border: 2px solid #ff4b72;
        }

        /* Message secret caché dessous */
        .scratch-secret {
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background-color: #221217;
            display: flex;
            flex-direction: column;
            justify-content: center;
            align-items: center;
            color: #ffffff;
            padding: 10px;
        }

        .scratch-secret p {
            font-size: 1.2rem;
            margin-bottom: 15px;
            font-weight: 500;
        }

        /* Toile de grattage au-dessus */
        #scratch-canvas {
            position: absolute;
            top: 0;
            left: 0;
            cursor: pointer;
            z-index: 5;
            touch-action: none;
        }

        /* --- STYLE FIN --- */
        .cake-icon {
            font-size: 7rem;
            cursor: pointer;
            transition: transform 0.3s cubic-bezier(0.175, 0.885, 0.32, 1.275);
            margin-bottom: 20px;
        }
        .cake-icon:hover {
            transform: scale(1.15) rotate(5deg);
        }

        .final-message {
            font-size: 1.8rem;
            color: #fff;
            font-weight: 600;
            margin-top: 25px;
            max-width: 500px;
            animation: pop 0.6s cubic-bezier(0.175, 0.885, 0.32, 1.275) both;
        }

        @keyframes pop {
            0% { transform: scale(0.3); opacity: 0; }
            100% { transform: scale(1); opacity: 1; }
        }
    </style>
</head>
<body>

    <canvas id="matrix-canvas"></canvas>

    <!-- PAGE 1: Accueil -->
    <div id="page1" class="page active">
        <h1>Joyeux 19ème Anniversaire</h1>
        <button class="btn" onclick="nextPage(2)">Suivant</button>
    </div>

    <!-- PAGE 2: La question personnalisée -->
    <div id="page2" class="page">
        <h1>Est-ce que tu m'aimes Louis</h1>
        <div class="btn-group">
            <button class="btn" id="btn-yes" onclick="nextPage(3); initScratch();">Oui</button>
            <button class="btn" id="btn-no" onmouseover="fuiteBouton()" onclick="fuiteBouton()" ontouchstart="fuiteBouton(event)">Non merci</button>
        </div>
    </div>

    <!-- PAGE 3: LE NOUVEAU TRUC INTERACTIF (TICKET À GRATTER) -->
    <div id="page3" class="page">
        <h1>Gratte l'écran pour découvrir ton accès</h1>
        <div class="scratch-container">
            <div class="scratch-secret">
                <p>Accès débloqué</p>
                <button class="btn" onclick="nextPage(4)">Continuer</button>
            </div>
            <canvas id="scratch-canvas" width="320" height="180"></canvas>
        </div>
    </div>

    <!-- PAGE 4: Le Gâteau final -->
    <div id="page4" class="page">
        <h1>Clique sur le gâteau</h1>
        <div class="cake-icon" onclick="openGift()">🎂</div>
        <div id="gift-message" class="final-message" style="display: none;">
            Voici ton cadeau. Passe une excellente journée.
        </div>
    </div>

    <script>
        // --- LOGIQUE DU BOUTON QUI S'ENFUIT ---
        function fuiteBouton(event) {
            if (event) event.preventDefault();
            const btnNo = document.getElementById('btn-no');
            btnNo.style.position = 'fixed';
            
            const maxX = window.innerWidth - btnNo.offsetWidth - 40;
            const maxY = window.innerHeight - btnNo.offsetHeight - 40;
            
            const randomX = Math.floor(Math.random() * maxX) + 20;
            const randomY = Math.floor(Math.random() * maxY) + 20;
            
            btnNo.style.left = randomX + 'px';
            btnNo.style.top = randomY + 'px';
        }

        // --- NAVIGATION ---
        function nextPage(pageNumber) {
            document.querySelectorAll('.page').forEach(page => {
                page.classList.remove('active');
            });
            document.getElementById('page' + pageNumber).classList.add('active');
        }

        function openGift() {
            document.getElementById('gift-message').style.display = 'block';
        }

        // --- LOGIQUE DU JEU À GRATTER ---
        function initScratch() {
            const sCanvas = document.getElementById('scratch-canvas');
            const sCtx = sCanvas.getContext('2d');
            
            // On remplit le canvas du dessus avec une couleur unie argentée/sombre à effacer
            sCtx.fillStyle = '#4a3b40';
            sCtx.fillRect(0, 0, sCanvas.width, sCanvas.height);
            
            // Petit texte indicatif sur la zone à gratter
            sCtx.font = '16px Fredoka';
            sCtx.fillStyle = '#ffffff';
            sCtx.textAlign = 'center';
            sCtx.fillText('Gratte ici avec ton doigt', sCanvas.width / 2, sCanvas.height / 2);

            let isDrawing = false;

            function scratch(e) {
                if (!isDrawing) return;
                
                // Gérer souris ou tactile
                const rect = sCanvas.getBoundingClientRect();
                const clientX = e.touches ? e.touches[0].clientX : e.clientX;
                const clientY = e.touches ? e.touches[0].clientY : e.clientY;
                
                const x = clientX - rect.left;
                const y = clientY - rect.top;

                // "Destination-out" permet de gommer le canvas du dessus
                sCtx.globalCompositeOperation = 'destination-out';
                sCtx.beginPath();
                sCtx.arc(x, y, 25, 0, Math.PI * 2); // Taille du pinceau pour gratter
                sCtx.fill();
            }

            sCanvas.addEventListener('mousedown', () => isDrawing = true);
            sCanvas.addEventListener('touchstart', () => isDrawing = true);
            
            window.addEventListener('mouseup', () => isDrawing = false);
            window.addEventListener('touchend', () => isDrawing = false);

            sCanvas.addEventListener('mousemove', scratch);
            sCanvas.addEventListener('touchmove', scratch);
        }

        // --- ARRIÈRE-PLAN MATRIX EN ROSE ---
        const canvas = document.getElementById('matrix-canvas');
        const ctx = canvas.getContext('2d');

        function resizeCanvas() {
            canvas.width = window.innerWidth;
            canvas.height = window.innerHeight;
        }
        window.addEventListener('resize', resizeCanvas);
        resizeCanvas();

        const alphabet = "♥LOVE19♥AYM♥TOI♥ALWAYS♥LOVE♥".split("");
        const fontSize = 16;
        let columns = canvas.width / fontSize;
        let rainDrops = [];

        function initRain() {
            columns = canvas.width / fontSize;
            rainDrops = [];
            for (let x = 0; x < columns; x++) {
                rainDrops[x] = Math.random() * -100;
            }
        }
        initRain();

        function drawMatrix() {
            ctx.fillStyle = 'rgba(11, 2, 5, 0.12)';
            ctx.fillRect(0, 0, canvas.width, canvas.height);

            ctx.font = fontSize + 'px sans-serif';

            for (let i = 0; i < rainDrops.length; i++) {
                const text = alphabet[Math.floor(Math.random() * alphabet.length)];
                
                if (Math.random() > 0.98) {
                    ctx.fillStyle = '#ffffff';
                } else {
                    ctx.fillStyle = Math.random() > 0.5 ? '#ff4b72' : '#ff85a2';
                }

                ctx.fillText(text, i * fontSize, rainDrops[i] * fontSize);

                if (rainDrops[i] * fontSize > canvas.height && Math.random() > 0.975) {
                    rainDrops[i] = 0;
                }
                rainDrops[i]++;
            }
        }

        setInterval(drawMatrix, 40);
    </script>
</body>
</html>
