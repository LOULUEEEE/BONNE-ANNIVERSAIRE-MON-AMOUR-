<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Joyeux Anniversaire !</title>
    <!-- Police mignonne similaire aux captures d'écran -->
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Fredoka:wght@300..700&display=swap" rel="stylesheet">
    
    <style>
        * {
            box-sizing: border-box;
            margin: 0;
            padding: 0;
        }

        body {
            font-family: 'Fredoka', sans-serif;
            background-color: #fcfbf7;
            height: 100vh;
            overflow: hidden;
            display: flex;
            justify-content: center;
            align-items: center;
            position: relative;
        }

        /* Conteneur pour la pluie de cœurs en arrière-plan */
        #heart-rain-container {
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            pointer-events: none;
            z-index: 1;
        }

        .falling-heart {
            position: absolute;
            color: rgba(255, 105, 180, 0.6);
            font-size: 24px;
            animation: fall linear infinite;
        }

        @keyframes fall {
            0% {
                transform: translateY(-10%) rotate(0deg);
                opacity: 0;
            }
            10% {
                opacity: 1;
            }
            90% {
                opacity: 1;
            }
            100% {
                transform: translateY(110vh) rotate(360deg);
                opacity: 0;
            }
        }

        /* Style des pages */
        .page {
            display: none;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            text-align: center;
            width: 90%;
            max-width: 500px;
            z-index: 2;
            padding: 20px;
        }

        .page.active {
            display: flex;
        }

        h1 {
            font-size: 2.5rem;
            color: #333;
            margin-bottom: 30px;
            font-weight: 500;
        }

        /* Boutons */
        .btn {
            font-family: 'Fredoka', sans-serif;
            background-color: transparent;
            border: 2px solid #555;
            padding: 10px 25px;
            font-size: 1.2rem;
            border-radius: 20px;
            cursor: pointer;
            color: #333;
            transition: all 0.2s ease;
            text-decoration: none;
            display: inline-block;
        }

        .btn:hover {
            background-color: #333;
            color: #fff;
            transform: scale(1.05);
        }

        .btn-group {
            display: flex;
            gap: 20px;
            margin-top: 20px;
        }

        /* Styles spécifiques pour le gâteau et l'encadré rose */
        .card {
            background-color: #ffb7b2;
            border: 2px solid #333;
            border-radius: 25px;
            padding: 30px;
            width: 100%;
            box-shadow: 5px 5px 0px #333;
            display: flex;
            flex-direction: column;
            align-items: center;
            gap: 20px;
        }

        .card p {
            font-size: 1.5rem;
            color: #333;
        }

        .cake-icon {
            font-size: 5rem;
            cursor: pointer;
            transition: transform 0.2s;
            user-select: none;
        }

        .cake-icon:hover {
            transform: scale(1.1) rotate(5deg);
        }

        /* Message final */
        .final-message {
            font-size: 1.8rem;
            color: #ff4b72;
            font-weight: 600;
            margin-top: 20px;
            animation: pop 0.5s ease-out;
        }

        @keyframes pop {
            0% { transform: scale(0.5); opacity: 0; }
            100% { transform: scale(1); opacity: 1; }
        }
    </style>
</head>
<body>

    <!-- Arrière-plan avec pluie de cœurs -->
    <div id="heart-rain-container"></div>

    <!-- PAGE 1: Accueil -->
    <div id="page1" class="page active">
        <h1>Joyeux Anniversaire ! ❤️</h1>
        <button class="btn" onclick="nextPage(2)">Suivant :3</button>
    </div>

    <!-- PAGE 2: La question -->
    <div id="page2" class="page">
        <h1>J'ai quelque chose pour toi...</h1>
        <div class="btn-group">
            <button class="btn" onclick="nextPage(3)">Oui !</button>
            <button class="btn" onclick="alert('Oh, d\'accord... mais tu devrais quand même cliquer sur Oui ! 😜')">Non merci</button>
        </div>
    </div>

    <!-- PAGE 3: Le Gâteau -->
    <div id="page3" class="page">
        <div class="card">
            <p>Clique sur le gâteau pour ouvrir ton cadeau !</p>
            <!-- Icône de gâteau en texte/emoji pour éviter les images externes -->
            <div class="cake-icon" onclick="openGift()">🎂</div>
        </div>
        <div id="gift-message" class="final-message" style="display: none;">
            🎁 Voici ton cadeau ! Passe une journée magique ! ✨
        </div>
    </div>

    <script>
        // Fonction pour changer de page
        function nextPage(pageNumber) {
            // Désactiver toutes les pages
            document.querySelectorAll('.page').forEach(page => {
                page.classList.remove('active');
            });
            // Activer la page demandée
            document.getElementById('page' + pageNumber).classList.add('active');
        }

        // Fonction pour révéler le cadeau sur la page 3
        function openGift() {
            const message = document.getElementById('gift-message');
            message.style.display = 'block';
            
            // Explosion de cœurs au clic
            for(let i=0; i<15; i++) {
                createHeart(true);
            }
        }

        // Fonction pour générer la pluie de cœurs en arrière-plan
        function createHeart(isExplosion = false) {
            const container = document.getElementById('heart-rain-container');
            const heart = document.createElement('div');
            heart.classList.add('falling-heart');
            heart.innerHTML = '❤️';
            
            // Position aléatoire en largeur
            const startX = Math.random() * 100;
            heart.style.left = startX + 'vw';
            
            // Taille aléatoire
            const size = Math.random() * 20 + 15;
            heart.style.fontSize = size + 'px';
            
            // Vitesse aléatoire
            const duration = Math.random() * 3 + 3; // entre 3s et 6s
            heart.style.animationDuration = duration + 's';
            
            // Si c'est une explosion au clic sur le gâteau
            if(isExplosion) {
                heart.style.top = '50vh';
                heart.style.left = (Math.random() * 40 + 30) + 'vw'; // centré
                heart.style.animationDuration = (Math.random() * 1.5 + 1) + 's';
            }

            container.appendChild(heart);

            // Supprimer le cœur après son animation pour ne pas surcharger le navigateur
            setTimeout(() => {
                heart.remove();
            }, duration * 1000);
        }

        // Lancer la pluie de cœurs en continu au chargement
        setInterval(() => {
            createHeart();
        }, 300);
    </script>
</body>
</html>
