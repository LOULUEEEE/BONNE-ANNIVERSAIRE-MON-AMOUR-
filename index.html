<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Joyeux Anniversaire !</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Fredoka:wght@300..700&display=swap" rel="stylesheet">
    
    <style>
        * {
            box-sizing: border-box;
            margin: 0;
            padding: 0;
        }

        body {
            font-family: 'Fredoka', sans-serif;
            background-color: #0b0205; /* Fond sombre pour faire ressortir la pluie style Matrix rose */
            height: 100vh;
            overflow: hidden;
            display: flex;
            justify-content: center;
            align-items: center;
            position: relative;
        }

        /* Canvas pour la pluie digitale rose en arrière-plan */
        #matrix-canvas {
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            z-index: 1;
        }

        /* Style des pages */
        .page {
            display: none;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            text-align: center;
            width: 90%;
            max-width: 500px;
            z-index: 2;
            padding: 30px;
            background-color: rgba(252, 251, 247, 0.92); /* Boîte claire semi-transparente */
            border-radius: 30px;
            box-shadow: 0 10px 30px rgba(255, 105, 180, 0.3);
            border: 2px solid #ffb7b2;
        }

        .page.active {
            display: flex;
        }

        h1 {
            font-size: 2.2rem;
            color: #222;
            margin-bottom: 30px;
            font-weight: 600;
            line-height: 1.3;
        }

        /* Boutons */
        .btn {
            font-family: 'Fredoka', sans-serif;
            background-color: #fff;
            border: 2px solid #333;
            padding: 12px 28px;
            font-size: 1.2rem;
            border-radius: 25px;
            cursor: pointer;
            color: #333;
            transition: background-color 0.2s, color 0.2s, transform 0.1s;
            font-weight: 500;
        }

        .btn:hover {
            background-color: #333;
            color: #fff;
        }

        .btn-group {
            display: flex;
            gap: 20px;
            margin-top: 20px;
            position: relative;
            width: 100%;
            justify-content: center;
            min-height: 60px;
        }

        /* Style spécial pour le bouton fuyard */
        #btn-no {
            position: relative;
            transition: all 0.1s ease;
            z-index: 10;
        }

        /* Styles pour la page du gâteau */
        .card {
            background-color: #ffb7b2;
            border: 2px solid #333;
            border-radius: 25px;
            padding: 30px;
            width: 100%;
            box-shadow: 5px 5px 0px #333;
            display: flex;
            flex-direction: column;
            align-items: center;
            gap: 20px;
        }

        .card p {
            font-size: 1.4rem;
            color: #333;
            font-weight: 500;
        }

        .cake-icon {
            font-size: 5rem;
            cursor: pointer;
            transition: transform 0.2s;
            user-select: none;
        }

        .cake-icon:hover {
            transform: scale(1.1) rotate(5deg);
        }

        /* Message de fin */
        .final-message {
            font-size: 1.6rem;
            color: #ff4b72;
            font-weight: 600;
            margin-top: 25px;
            animation: pop 0.5s cubic-bezier(0.175, 0.885, 0.32, 1.275) both;
        }

        @keyframes pop {
            0% { transform: scale(0.3); opacity: 0; }
            100% { transform: scale(1); opacity: 1; }
        }
    </style>
</head>
<body>

    <canvas id="matrix-canvas"></canvas>

    <div id="page1" class="page active">
        <h1>Joyeux 19ème Anniversaire ! 🎉</h1>
        <button class="btn" onclick="nextPage(2)">Suivant :3</button>
    </div>

    <div id="page2" class="page">
        <h1>Est-ce que tu m'aimes de tout ton cœur ? 🥺</h1>
        <div class="btn-group" id="container-boutons">
            <button class="btn" id="btn-yes" onclick="nextPage(3)">Oui ! ❤️</button>
            <button class="btn" id="btn-no" onmouseover="fuiteBouton()" onclick="fuiteBouton()" ontouchstart="fuiteBouton(event)">Non merci</button>
        </div>
    </div>

    <div id="page3" class="page">
        <div class="card">
            <p>Clique sur le gâteau pour ouvrir ta surprise !</p>
            <div class="cake-icon" onclick="openGift()">🎂</div>
        </div>
        <div id="gift-message" class="final-message" style="display: none;">
            🎁 Je t'aime ! Prépare-toi pour une super surprise aujourd'hui ! ✨
        </div>
    </div>

    <script>
        // --- LOGIQUE DU BOUTON QUI S'ENFUIT ---
        function fuiteBouton(event) {
            if (event) event.preventDefault(); // Empêche le clic sur téléphone
            
            const btnNo = document.getElementById('btn-no');
            
            // On passe le bouton en position fixe pour qu'il puisse voyager partout sur l'écran
            btnNo.style.position = 'fixed';
            
            // Calcul de positions aléatoires sur l'écran en évitant de trop coller aux bords
            const maxX = window.innerWidth - btnNo.offsetWidth - 30;
            const maxY = window.innerHeight - btnNo.offsetHeight - 30;
            
            const randomX = Math.floor(Math.random() * maxX) + 15;
            const randomY = Math.floor(Math.random() * maxY) + 15;
            
            btnNo.style.left = randomX + 'px';
            btnNo.style.top = randomY + 'px';
        }

        // --- NAVIGATION ENTRE PAGES ---
        function nextPage(pageNumber) {
            document.querySelectorAll('.page').forEach(page => {
                page.classList.remove('active');
            });
            document.getElementById('page' + pageNumber).classList.add('active');
        }

        function openGift() {
            document.getElementById('gift-message').style.display = 'block';
            // Augmente l'intensité de la pluie au clic
            matrixSpeed = 50;
        }

        // --- PLUIE DIGITALE (STYLE MATRIX EN ROSE) ---
        const canvas = document.getElementById('matrix-canvas');
        const ctx = canvas.getContext('2d');

        function resizeCanvas() {
            canvas.width = window.innerWidth;
            canvas.height = window.innerHeight;
        }
        window.addEventListener('resize', resizeCanvas);
        resizeCanvas();

        // Caractères à faire défiler (Mélange de lettres et de cœurs)
        const alphabet = "♥LOVE19♥AYM♥TOI♥ALWAYS♥LOVE♥".split("");
        
        const fontSize = 16;
        let columns = canvas.width / fontSize;
        let rainDrops = [];

        function initRain() {
            columns = canvas.width / fontSize;
            rainDrops = [];
            for (let x = 0; x < columns; x++) {
                rainDrops[x] = Math.random() * -100; // Positions de départ décalées
            }
        }
        initRain();
        window.addEventListener('resize', initRain);

        function drawMatrix() {
            // Effet de traînée translucide pour donner l'effet cascade
            ctx.fillStyle = 'rgba(11, 2, 5, 0.12)';
            ctx.fillRect(0, 0, canvas.width, canvas.height);

            // Style des lettres tombantes (Nuances de roses)
            ctx.font = fontSize + 'px sans-serif';

            for (let i = 0; i < rainDrops.length; i++) {
                const text = alphabet[Math.floor(Math.random() * alphabet.length)];
                
                // Aléatoirement blanc brillant pour la tête de la colonne, sinon rose
                if (Math.random() > 0.98) {
                    ctx.fillStyle = '#ffffff';
                } else {
                    ctx.fillStyle = Math.random() > 0.5 ? '#ff4b72' : '#ff85a2';
                }

                ctx.fillText(text, i * fontSize, rainDrops[i] * fontSize);

                // Si la goutte arrive en bas, on la renvoie en haut de façon aléatoire
                if (rainDrops[i] * fontSize > canvas.height && Math.random() > 0.975) {
                    rainDrops[i] = 0;
                }
                rainDrops[i]++;
            }
        }

        setInterval(drawMatrix, 40);
    </script>
</body>
</html>
