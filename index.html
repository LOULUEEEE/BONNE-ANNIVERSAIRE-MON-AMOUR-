<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Joyeux Anniversaire !</title>
    <!-- Police mignonne et arrondie -->
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Fredoka:wght@300..700&display=swap" rel="stylesheet">
    
    <style>
        * {
            box-sizing: border-box;
            margin: 0;
            padding: 0;
            user-select: none;
            -webkit-user-select: none;
        }

        body {
            font-family: 'Fredoka', sans-serif;
            background-color: #0b0205; /* Fond sombre de la vidéo */
            height: 100vh;
            overflow: hidden;
            display: flex;
            justify-content: center;
            align-items: center;
            position: relative;
        }

        /* Canvas pour la pluie digitale rose en arrière-plan */
        #matrix-canvas {
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            z-index: 1;
        }

        /* Style des pages (PLUS DE CADRE AUTOUR, TOUT FLOTTE) */
        .page {
            display: none;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            text-align: center;
            width: 100%;
            height: 100%;
            z-index: 2;
            position: absolute;
            padding: 20px;
        }

        .page.active {
            display: flex;
        }

        /* Textes blancs/lumineux pour contraster directement sur le fond */
        h1 {
            font-size: 2.5rem;
            color: #ffffff;
            text-shadow: 0 0 10px #ff4b72, 0 0 20px #ff4b72;
            margin-bottom: 40px;
            font-weight: 600;
            max-width: 600px;
            line-height: 1.4;
        }

        /* Boutons stylisés sans fond opaque lourd */
        .btn {
            font-family: 'Fredoka', sans-serif;
            background-color: rgba(255, 255, 255, 0.9);
            border: 2px solid #ff4b72;
            padding: 14px 35px;
            font-size: 1.3rem;
            border-radius: 30px;
            cursor: pointer;
            color: #222;
            box-shadow: 0 0 15px rgba(255, 75, 114, 0.4);
            transition: all 0.2s ease;
            font-weight: 600;
        }

        .btn:hover {
            background-color: #ff4b72;
            color: #fff;
            box-shadow: 0 0 25px #ff4b72;
            transform: scale(1.05);
        }

        .btn-group {
            display: flex;
            gap: 25px;
            margin-top: 20px;
            justify-content: center;
            align-items: center;
            min-height: 70px;
            width: 100%;
        }

        #btn-no {
            position: relative;
            transition: all 0.12s cubic-bezier(0.175, 0.885, 0.32, 1.275);
        }

        /* --- STYLES MINI-JEU : LE CŒUR CLICQUABLE --- */
        .game-heart {
            font-size: 6rem;
            cursor: pointer;
            display: inline-block;
            transition: transform 0.1s ease;
            filter: drop-shadow(0 0 15px #ff4b72);
            animation: pulse 1.5s infinite;
            margin: 20px 0;
        }

        @keyframes pulse {
            0% { transform: scale(1); }
            50% { transform: scale(1.08); }
            100% { transform: scale(1); }
        }

        .progress-container {
            width: 250px;
            background-color: rgba(255, 255, 255, 0.2);
            border: 2px solid #ff4b72;
            height: 25px;
            border-radius: 15px;
            margin-top: 20px;
            overflow: hidden;
            box-shadow: 0 0 10px rgba(255, 75, 114, 0.5);
        }

        .progress-bar {
            height: 100%;
            width: 0%;
            background: linear-gradient(90deg, #ff85a2, #ff4b72);
            transition: width 0.2s ease;
        }

        .counter-text {
            color: #fff;
            font-size: 1.2rem;
            margin-top: 10px;
            text-shadow: 0 0 5px #ff4b72;
        }

        .live-comment {
            color: #ff85a2;
            font-size: 1.4rem;
            height: 30px;
            margin-bottom: 15px;
            font-weight: 500;
            text-shadow: 0 0 8px rgba(255, 133, 162, 0.6);
        }

        /* --- STYLE PAGE GÂTEAU FINAL --- */
        .cake-icon {
            font-size: 7rem;
            cursor: pointer;
            filter: drop-shadow(0 0 20px #ffb7b2);
            transition: transform 0.3s cubic-bezier(0.175, 0.885, 0.32, 1.275);
            margin-bottom: 20px;
        }
        .cake-icon:hover {
            transform: scale(1.15) rotate(5deg);
        }

        .final-message {
            font-size: 1.8rem;
            color: #fff;
            text-shadow: 0 0 10px #ff4b72, 0 0 20px #ff4b72;
            font-weight: 600;
            margin-top: 25px;
            max-width: 500px;
            animation: pop 0.6s cubic-bezier(0.175, 0.885, 0.32, 1.275) both;
        }

        /* Éléments d'explosions de clics */
        .click-heart {
            position: absolute;
            color: #ff4b72;
            pointer-events: none;
            font-size: 20px;
            animation: flyUp 0.8s ease-out forwards;
            z-index: 10;
        }

        @keyframes flyUp {
            0% { transform: translate(0, 0) scale(1); opacity: 1; }
            100% { transform: translate(var(--x), var(--y)) scale(0); opacity: 0; }
        }
    </style>
</head>
<body>

    <!-- Arrière-plan Matrix en Rose pur sans coupure -->
    <canvas id="matrix-canvas"></canvas>

    <!-- PAGE 1: Accueil -->
    <div id="page1" class="page active">
        <h1>Joyeux 19ème Anniversaire ! 🎉</h1>
        <button class="btn" onclick="nextPage(2)">Suivant :3</button>
    </div>

    <!-- PAGE 2: La question avec fuite -->
    <div id="page2" class="page">
        <h1>Est-ce que tu m'aimes de tout ton cœur ? 🥺</h1>
        <div class="btn-group">
            <button class="btn" id="btn-yes" onclick="nextPage(3)">Oui ! ❤️</button>
            <button class="btn" id="btn-no" onmouseover="fuiteBouton()" onclick="fuiteBouton()" ontouchstart="fuiteBouton(event)">Non merci</button>
        </div>
    </div>

    <!-- PAGE 3: LE NOUVEAU MINI-JEU INTERACTIF -->
    <div id="page3" class="page">
        <h1>Prouve-le moi !<br>Mets toute ton énergie dans ce cœur !</h1>
        <div class="live-comment" id="game-comment">Clique pour charger la jauge...</div>
        <div class="game-heart" id="big-heart" onclick="clickHeart(event)">❤️</div>
        <div class="progress-container">
            <div class="progress-bar" id="love-bar"></div>
        </div>
        <div class="counter-text" id="counter-text">Niveau d'amour : 0%</div>
    </div>

    <!-- PAGE 4: Le Gâteau final -->
    <div id="page4" class="page">
        <h1>Jauge chargée à 100% ! ✨</h1>
        <div class="cake-icon" onclick="openGift()">🎂</div>
        <div id="gift-message" class="final-message" style="display: none;">
            🎁 Tu as débloqué ta surprise ! Prépare-toi, j'ai hâte de fêter ça avec toi ! 🥰
        </div>
    </div>

    <script>
        // --- LOGIQUE MINI-JEU CLIC CŒUR ---
        let loveScore = 0;
        const comments = [
            "Encore un peu ! 😘",
            "Tu te débrouilles bien ! ❤️",
            "Plus vite ! 🔥",
            "Wow, tant d'amour ? 🥰",
            "Presque au maximum ! 🚀",
            "C'est débloqué ! 🎉"
        ];

        function clickHeart(event) {
            if (loveScore >= 100) return;

            loveScore += 10; // Augmente de 10% à chaque clic
            if (loveScore > 100) loveScore = 100;

            // Mises à jour visuelles
            document.getElementById('love-bar').style.width = loveScore + '%';
            document.getElementById('counter-text').innerText = "Niveau d'amour : " + loveScore + "%";
            
            // Commentaire qui change suivant la progression
            const commentIndex = Math.min(Math.floor(loveScore / 20), comments.length - 1);
            document.getElementById('game-comment').innerText = comments[commentIndex];

            // Animation de rebond du gros cœur
            const bigHeart = document.getElementById('big-heart');
            bigHeart.style.transform = 'scale(1.3)';
            setTimeout(() => bigHeart.style.transform = 'none', 100);

            // Générer de petits cœurs volants à l'endroit du clic
            for(let i=0; i<6; i++) {
                spawnFlyingHeart(event.clientX, event.clientY);
            }

            // Quand c'est fini, on passe automatiquement à la page du gâteau
            if (loveScore === 100) {
                setTimeout(() => {
                    nextPage(4);
                }, 1000);
            }
        }

        function spawnFlyingHeart(x, y) {
            const h = document.createElement('div');
            h.classList.add('click-heart');
            h.innerHTML = '❤️';
            h.style.left = x + 'px';
            h.style.top = y + 'px';
            
            // Directions aléatoires d'explosion
            const destX = (Math.random() - 0.5) * 200 + 'px';
            const destY = -(Math.random() * 150 + 50) + 'px';
            h.style.setProperty('--x', destX);
            h.style.setProperty('--y', destY);

            document.body.appendChild(h);
            setTimeout(() => h.remove(), 800);
        }

        // --- LOGIQUE DU BOUTON QUI S'ENFUIT ---
        function fuiteBouton(event) {
            if (event) event.preventDefault();
            const btnNo = document.getElementById('btn-no');
            btnNo.style.position = 'fixed';
            
            const maxX = window.innerWidth - btnNo.offsetWidth - 40;
            const maxY = window.innerHeight - btnNo.offsetHeight - 40;
            
            const randomX = Math.floor(Math.random() * maxX) + 20;
            const randomY = Math.floor(Math.random() * maxY) + 20;
            
            btnNo.style.left = randomX + 'px';
            btnNo.style.top = randomY + 'px';
        }

        // --- NAVIGATION ---
        function nextPage(pageNumber) {
            document.querySelectorAll('.page').forEach(page => {
                page.classList.remove('active');
            });
            document.getElementById('page' + pageNumber).classList.add('active');
        }

        function openGift() {
            document.getElementById('gift-message').style.display = 'block';
            // On accélère la pluie Matrix pour fêter ça !
            matrixIntervalSpeed = 20; 
            restartMatrix();
        }

        // --- ARRIÈRE-PLAN MATRIX EN ROSE ---
        const canvas = document.getElementById('matrix-canvas');
        const ctx = canvas.getContext('2d');

        function resizeCanvas() {
            canvas.width = window.innerWidth;
            canvas.height = window.innerHeight;
        }
        window.addEventListener('resize', resizeCanvas);
        resizeCanvas();

        const alphabet = "♥LOVE19♥AYM♥TOI♥ALWAYS♥LOVE♥".split("");
        const fontSize = 16;
        let columns = canvas.width / fontSize;
        let rainDrops = [];

        function initRain() {
            columns = canvas.width / fontSize;
            rainDrops = [];
            for (let x = 0; x < columns; x++) {
                rainDrops[x] = Math.random() * -100;
            }
        }
        initRain();

        function drawMatrix() {
            ctx.fillStyle = 'rgba(11, 2, 5, 0.12)';
            ctx.fillRect(0, 0, canvas.width, canvas.height);

            ctx.font = fontSize + 'px sans-serif';

            for (let i = 0; i < rainDrops.length; i++) {
                const text = alphabet[Math.floor(Math.random() * alphabet.length)];
                
                if (Math.random() > 0.98) {
                    ctx.fillStyle = '#ffffff'; // Tête lumineuse blanche
                } else {
                    ctx.fillStyle = Math.random() > 0.5 ? '#ff4b72' : '#ff85a2'; // Dégradés de roses
                }

                ctx.fillText(text, i * fontSize, rainDrops[i] * fontSize);

                if (rainDrops[i] * fontSize > canvas.height && Math.random() > 0.975) {
                    rainDrops[i] = 0;
                }
                rainDrops[i]++;
            }
        }

        let matrixIntervalSpeed = 40;
        let matrixId = setInterval(drawMatrix, matrixIntervalSpeed);

        function restartMatrix() {
            clearInterval(matrixId);
            matrixId = setInterval(drawMatrix, matrixIntervalSpeed);
        }
    </script>
</body>
</html>
