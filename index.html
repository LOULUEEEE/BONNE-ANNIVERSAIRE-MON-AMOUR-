<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Bon Anniversaire</title>
    <!-- Nouvelle police épurée et élégante -->
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@400;600;700&display=swap" rel="stylesheet">
    
    <style>
        * {
            box-sizing: border-box;
            margin: 0;
            padding: 0;
            user-select: none;
            -webkit-user-select: none;
        }

        body {
            font-family: 'Plus Jakarta Sans', sans-serif;
            background-color: #0b0205;
            height: 100vh;
            overflow: hidden;
            display: flex;
            justify-content: center;
            align-items: center;
            position: relative;
        }

        #matrix-canvas {
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            z-index: 1;
        }

        .page {
            display: none;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            text-align: center;
            width: 100%;
            height: 100%;
            z-index: 2;
            position: absolute;
            padding: 20px;
        }

        .page.active {
            display: flex;
        }

        h1 {
            font-size: 2.6rem;
            color: #ffffff;
            margin-bottom: 40px;
            font-weight: 600;
            max-width: 600px;
            line-height: 1.4;
            letter-spacing: -0.5px;
        }

        .btn {
            font-family: 'Plus Jakarta Sans', sans-serif;
            background-color: rgba(255, 255, 255, 0.95);
            border: 2px solid #ff4b72;
            padding: 14px 35px;
            font-size: 1.2rem;
            border-radius: 30px;
            cursor: pointer;
            color: #222;
            transition: all 0.2s ease;
            font-weight: 600;
        }

        .btn:hover {
            background-color: #ff4b72;
            color: #fff;
            transform: scale(1.05);
        }

        /* Alignement des boutons côte à côte dès le début */
        .btn-group {
            display: flex;
            gap: 20px;
            margin-top: 20px;
            justify-content: center;
            align-items: center;
            width: 100%;
            max-width: 400px;
        }

        #btn-no {
            position: relative;
            transition: all 0.1s ease;
        }

        /* --- TRUC INTERACTIF : BULLES À ÉCLATER --- */
        .bubble {
            position: absolute;
            background: rgba(255, 133, 162, 0.2);
            border: 2px solid rgba(255, 75, 114, 0.6);
            border-radius: 50%;
            cursor: pointer;
            display: flex;
            justify-content: center;
            align-items: center;
            color: white;
            font-size: 1.5rem;
            animation: floatUp 4s linear infinite;
            z-index: 5;
        }

        @keyframes floatUp {
            0% { transform: translateY(105vh) scale(1); opacity: 0.8; }
            100% { transform: translateY(-15vh) scale(1); opacity: 0; }
        }

        /* --- STYLE FINAL --- */
        .cake-icon {
            font-size: 7rem;
            cursor: pointer;
            transition: transform 0.3s cubic-bezier(0.175, 0.885, 0.32, 1.275);
            margin-bottom: 20px;
        }
        .cake-icon:hover {
            transform: scale(1.15) rotate(5deg);
        }

        .final-message {
            font-size: 1.8rem;
            color: #fff;
            font-weight: 600;
            margin-top: 25px;
            max-width: 500px;
            animation: pop 0.6s cubic-bezier(0.175, 0.885, 0.32, 1.275) both;
        }

        .burst-particle {
            position: absolute;
            color: #ff4b72;
            pointer-events: none;
            font-size: 20px;
            animation: scatter 0.6s ease-out forwards;
            z-index: 10;
        }

        @keyframes scatter {
            0% { transform: translate(0, 0) scale(1); opacity: 1; }
            100% { transform: translate(var(--x), var(--y)) scale(0); opacity: 0; }
        }

        @keyframes pop {
            0% { transform: scale(0.3); opacity: 0; }
            100% { transform: scale(1); opacity: 1; }
        }
    </style>
</head>
<body>

    <canvas id="matrix-canvas"></canvas>

    <!-- PAGE 1: Accueil -->
    <div id="page1" class="page active">
        <h1>Bon anniversaire ma elise ❤️</h1>
        <button class="btn" onclick="nextPage(2)">Suivant</button>
    </div>

    <!-- PAGE 2: La question (Boutons bien côte à côte) -->
    <div id="page2" class="page">
        <h1>Tu es prête pour la suite ?</h1>
        <div class="btn-group">
            <button class="btn" id="btn-yes" onclick="nextPage(3); startBubbleGame();">Oui</button>
            <button class="btn" id="btn-no" onmouseover="fuiteBouton()" onclick="fuiteBouton()" ontouchstart="fuiteBouton(event)">Non merci</button>
        </div>
    </div>

    <!-- PAGE 3: TRUC INTERACTIF (LES BULLES) -->
    <div id="page3" class="page">
        <h1 id="bubble-title">Éclate 5 bulles roses !</h1>
        <!-- Les bulles vont apparaître ici en JS -->
    </div>

    <!-- PAGE 4: Le Gâteau final -->
    <div id="page4" class="page">
        <h1>Clique sur le gâteau</h1>
        <div class="cake-icon" onclick="openGift()">🎂</div>
        <div id="gift-message" class="final-message" style="display: none;">
            Voici ton cadeau. Passe une excellente journée.
        </div>
    </div>

    <script>
        // --- LOGIQUE DU BOUTON QUI S'ENFUIT ---
        function fuiteBouton(event) {
            if (event) event.preventDefault();
            const btnNo = document.getElementById('btn-no');
            btnNo.style.position = 'fixed';
            
            const maxX = window.innerWidth - btnNo.offsetWidth - 40;
            const maxY = window.innerHeight - btnNo.offsetHeight - 40;
            
            const randomX = Math.floor(Math.random() * maxX) + 20;
            const randomY = Math.floor(Math.random() * maxY) + 20;
            
            btnNo.style.left = randomX + 'px';
            btnNo.style.top = randomY + 'px';
        }

        // --- NAVIGATION ---
        function nextPage(pageNumber) {
            document.querySelectorAll('.page').forEach(page => {
                page.classList.remove('active');
            });
            document.getElementById('page' + pageNumber).classList.add('active');
        }

        function openGift() {
            document.getElementById('gift-message').style.display = 'block';
        }

        // --- TRUC INTERACTIF : JEU DES BULLES ---
        let bubblesPopped = 0;
        let bubbleInterval;

        function startBubbleGame() {
            bubbleInterval = setInterval(() => {
                if (bubblesPopped >= 5) {
                    clearInterval(bubbleInterval);
                    return;
                }
                createBubble();
            }, 600);
        }

        function createBubble() {
            const page3 = document.getElementById('page3');
            const bubble = document.createElement('div');
            bubble.classList.add('bubble');
            
            const size = Math.random() * 40 + 60; // taille entre 60px et 100px
            bubble.style.width = size + 'px';
            bubble.style.height = size + 'px';
            bubble.style.left = Math.random() * (window.innerWidth - size) + 'px';
            
            // Vitesse aléatoire
            bubble.style.animationDuration = (Math.random() * 2 + 3) + 's';

            bubble.onclick = (e) => {
                bubblesPopped++;
                document.getElementById('bubble-title').innerText = "Encore " + (5 - bubblesPopped) + " !";
                
                // Effet d'éclatement
                triggerBurst(e.clientX, e.clientY);
                bubble.remove();

                if (bubblesPopped >= 5) {
                    setTimeout(() => {
                        nextPage(4); // Passe directement au gâteau
                    }, 400);
                }
            };

            page3.appendChild(bubble);
            
            // Supprime la bulle si elle sort de l'écran sans être cliquée
            setTimeout(() => { bubble.remove(); }, 5000);
        }

        function triggerBurst(x, y) {
            for (let i = 0; i < 8; i++) {
                const p = document.createElement('div');
                p.classList.add('burst-particle');
                p.innerHTML = '❤️';
                p.style.left = x + 'px';
                p.style.top = y + 'px';
                
                const angle = Math.random() * Math.PI * 2;
                const speed = Math.random() * 100 + 40;
                p.style.setProperty('--x', Math.cos(angle) * speed + 'px');
                p.style.setProperty('--y', Math.sin(angle) * speed + 'px');
                
                document.body.appendChild(p);
                setTimeout(() => p.remove(), 600);
            }
        }

        // --- ARRIÈRE-PLAN MATRIX EN ROSE ---
        const canvas = document.getElementById('matrix-canvas');
        const ctx = canvas.getContext('2d');

        function resizeCanvas() {
            canvas.width = window.innerWidth;
            canvas.height = window.innerHeight;
        }
        window.addEventListener('resize', resizeCanvas);
        resizeCanvas();

        const alphabet = "♥LOVE♥ELISE♥TOI♥ALWAYS♥LOVE♥".split("");
        const fontSize = 16;
        let columns = canvas.width / fontSize;
        let rainDrops = [];

        function initRain() {
            columns = canvas.width / fontSize;
            rainDrops = [];
            for (let x = 0; x < columns; x++) {
                rainDrops[x] = Math.random() * -100;
            }
        }
        initRain();

        function drawMatrix() {
            ctx.fillStyle = 'rgba(11, 2, 5, 0.12)';
            ctx.fillRect(0, 0, canvas.width, canvas.height);

            ctx.font = fontSize + 'px sans-serif';

            for (let i = 0; i < rainDrops.length; i++) {
                const text = alphabet[Math.floor(Math.random() * alphabet.length)];
                
                if (Math.random() > 0.98) {
                    ctx.fillStyle = '#ffffff';
                } else {
                    ctx.fillStyle = Math.random() > 0.5 ? '#ff4b72' : '#ff85a2';
                }

                ctx.fillText(text, i * fontSize, rainDrops[i] * fontSize);

                if (rainDrops[i] * fontSize > canvas.height && Math.random() > 0.975) {
                    rainDrops[i] = 0;
                }
                rainDrops[i]++;
            }
        }

        setInterval(drawMatrix, 40);
    </script>
</body>
</html>
